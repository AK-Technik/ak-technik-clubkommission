name: "✅ Lösung dokumentieren"
description: "Funktionierendes Setup oder gelöstes Problem teilen"
labels: ["gelöst"]
body:
  - type: dropdown
    id: kategorie
    attributes:
      label: Kategorie
      options:
        - Home Automation / HA
        - Netzwerk / IT
        - Lighting / DMX / OSC
        - Audio / Dante / MIDI
        - Sicherheit / Zugang
        - Video / Streaming
        - Sonstiges
    validations:
      required: true

  - type: input
    id: venue
    attributes:
      label: Venue / Location
      placeholder: "z.B. Festsaal Kreuzberg"

  - type: textarea
    id: zusammenfassung
    attributes:
      label: Was wird hier dokumentiert?
      placeholder: "Kurze Zusammenfassung der Lösung oder des Setups..."
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Hardware / Software
      placeholder: |
        - Hardware: z.B. Sonoff ZBDongle-P, Raspberry Pi 5
        - Software: z.B. Home Assistant 2024.12, QLC+ 5.0

  - type: textarea
    id: loesung
    attributes:
      label: Die Lösung / Konfiguration
      description: "So detailliert wie möglich – Code, Configs, Screenshots gerne direkt einfügen"
    validations:
      required: true

  - type: textarea
    id: fallstricke
    attributes:
      label: Stolpersteine / Hinweise
      placeholder: "Was war tricky? Was sollte man beachten?"

  - type: textarea
    id: quellen
    attributes:
      label: Quellen / Links
      placeholder: "Hilfreiche Ressourcen, Dokumentationen, Forum-Posts..."
